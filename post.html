<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Details | DataNest Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at 10% 10%,rgba(255,94,98,.25),transparent 30%),
    radial-gradient(circle at 85% 5%,rgba(255,199,44,.18),transparent 28%),
    radial-gradient(circle at 80% 75%,rgba(0,229,255,.20),transparent 30%),
    linear-gradient(135deg,#080f2c,#151047 45%,#1a0b38);
  color:#f7fbff;
  line-height:1.6;
}
a{text-decoration:none;color:inherit}
.header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(7,12,35,.78);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,.12);
}
.nav{
  max-width:1180px;
  margin:auto;
  padding:16px 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.brand{
  font-size:28px;
  font-weight:900;
}
.brand span{
  background:linear-gradient(135deg,#ffcf33,#00e5ff,#8b5cf6);
  padding:8px 11px;
  border-radius:15px;
  color:#06101d;
  margin-right:8px;
}
.links{display:flex;gap:18px;align-items:center}
.links a{color:#d9e5ff;font-weight:800}
.links a:hover{color:#00e5ff}
.btn{
  display:inline-block;
  padding:12px 18px;
  border-radius:15px;
  font-weight:900;
  border:0;
  cursor:pointer;
  background:linear-gradient(135deg,#ffcf33,#00e5ff,#8b5cf6);
  color:#06101d;
}
.container{
  max-width:1180px;
  margin:auto;
  padding:42px 22px 80px;
}
.layout{
  display:grid;
  grid-template-columns:1fr 340px;
  gap:24px;
  align-items:start;
}
.card{
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.13);
  border-radius:28px;
  padding:26px;
  box-shadow:0 24px 70px rgba(0,0,0,.28);
}
.author{
  display:flex;
  gap:14px;
  align-items:center;
  margin-bottom:22px;
}
.avatar{
  width:52px;
  height:52px;
  border-radius:50%;
  background:linear-gradient(135deg,#ffcf33,#00e5ff,#8b5cf6);
  display:grid;
  place-items:center;
  color:#06101d;
  font-weight:900;
}
small{color:#aebee0}
h1{
  font-size:46px;
  line-height:1.08;
  margin-bottom:18px;
  background:linear-gradient(135deg,#fff,#ffe27a,#00e5ff,#c4b5fd);
  -webkit-background-clip:text;
  color:transparent;
}
h2{font-size:26px;margin-bottom:14px}
h3{font-size:20px;margin-bottom:8px}
p{color:#cbd7ee;margin-bottom:16px}
.post-content{
  white-space:pre-line;
  line-height:1.75;
  color:#d7e4ff;
}
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:18px 0;
}
.tags span{
  background:rgba(0,229,255,.13);
  border:1px solid rgba(0,229,255,.35);
  padding:7px 11px;
  border-radius:999px;
  color:#e9fbff;
  font-size:13px;
  font-weight:800;
}
.cover{
  min-height:220px;
  border-radius:24px;
  background:
    linear-gradient(135deg,rgba(255,207,51,.18),rgba(0,229,255,.18),rgba(139,92,246,.20)),
    repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0 8px,transparent 8px 16px);
  margin:24px 0;
  display:grid;
  place-items:center;
  font-size:56px;
}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:24px 0;
}
.actions button{
  background:rgba(255,255,255,.09);
  color:#eef6ff;
  border:1px solid rgba(255,255,255,.14);
  border-radius:999px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:800;
}
.actions button:hover{background:rgba(0,229,255,.16)}
.comment{
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.10);
  margin-bottom:12px;
}
textarea{
  width:100%;
  min-height:120px;
  padding:15px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.09);
  color:white;
  resize:vertical;
  margin-bottom:12px;
  font-family:Inter,Arial,sans-serif;
}
.msg{
  display:none;
  margin-bottom:12px;
  padding:12px 14px;
  border-radius:14px;
  font-weight:800;
}
.success{
  background:rgba(75,225,140,.14);
  border:1px solid rgba(75,225,140,.28);
  color:#bdffd6;
}
.error{
  background:rgba(255,90,90,.14);
  border:1px solid rgba(255,90,90,.28);
  color:#ffb7b7;
}
.side-list{display:grid;gap:14px}
.side-item{
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,.07);
  transition:.25s;
}
.side-item:hover{
  transform:translateY(-4px);
  background:rgba(255,255,255,.11);
}
.metric{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:14px;
}
.metric div{
  background:rgba(255,255,255,.07);
  border-radius:18px;
  padding:16px;
  text-align:center;
}
.metric strong{
  display:block;
  color:#00e5ff;
  font-size:26px;
}
.loading{
  min-height:50vh;
  display:grid;
  place-items:center;
  color:#cbd7ee;
  font-size:20px;
}
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .links{display:none}
  h1{font-size:34px}
}
</style>
</head>
<body>

<header class="header">
  <nav class="nav">
    <a class="brand" href="index.html"><span>DN</span>DataNest Pro</a>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="profile.html">Profile</a>
      <a href="admin.html">Admin</a>
      <a href="login.html" id="loginLink">Login</a>
    </div>
  </nav>
</header>

<main class="container">
  <div id="loading" class="loading">Loading post...</div>

  <div class="layout" id="pageContent" style="display:none;">
    <article class="card">
      <div class="author">
        <div class="avatar" id="authorAvatar">DN</div>
        <div>
          <strong id="authorName">Community Member</strong>
          <small id="postMeta">Loading...</small>
        </div>
      </div>

      <h1 id="postTitle">Post title</h1>

      <div class="tags">
        <span id="postCategory">Category</span>
        <span>Live Post</span>
      </div>

      <div class="cover">📊</div>

      <h2>Post Details</h2>
      <p class="post-content" id="postContent">Post content</p>

      <div class="actions">
        <button onclick="toggleLike()" id="likeBtn">👍 0</button>
        <button onclick="sharePost()">🔗 Share</button>
        <button>🔖 Bookmark</button>
        <button>🚩 Report</button>
      </div>

      <section>
        <h2>Comments</h2>

        <div id="comments"></div>

        <div id="messageBox" class="msg"></div>

        <textarea id="commentBox" placeholder="Write your comment..."></textarea>
        <button class="btn" onclick="addComment()">Post Comment</button>
      </section>
    </article>

    <aside class="card">
      <h2>Post Analytics</h2>
      <div class="metric">
        <div><strong id="likeCount">0</strong><span>Likes</span></div>
        <div><strong id="commentCount">0</strong><span>Comments</span></div>
        <div><strong>0</strong><span>Saves</span></div>
        <div><strong>Live</strong><span>Status</span></div>
      </div>

      <br>

      <h2>Related Posts</h2>
      <div class="side-list" id="relatedPosts"></div>
    </aside>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://fthirvblokveageirpwa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0aGlydmJsb2t2ZWFnZWlycHdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTU5MTgsImV4cCI6MjA5NzYzMTkxOH0.gRenoM6MwHLA-idWynTMYbabfrNHzHf32st8zml3cNA";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentPost = null;
let currentPostId = null;
let userLiked = false;

function escapeHTML(str){
  return String(str || "").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}

function showMessage(type,msg){
  const box = document.getElementById("messageBox");
  box.className = "msg " + type;
  box.style.display = "block";
  box.innerText = msg;
}

function getInitials(email){
  return email ? email.substring(0,2).toUpperCase() : "DN";
}

function getPostIdFromUrl(){
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

async function checkSession(){
  const { data } = await supabaseClient.auth.getSession();
  currentUser = data.session ? data.session.user : null;

  if(currentUser){
    document.getElementById("loginLink").innerText = "Profile";
    document.getElementById("loginLink").href = "profile.html";
  }
}

async function loadPost(){
  currentPostId = getPostIdFromUrl();

  let query = supabaseClient
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

  if(currentPostId){
    query = supabaseClient
      .from("posts")
      .select("*")
      .eq("id", currentPostId);
  }

  const { data, error } = await query.limit(1);

  if(error || !data || !data.length){
    document.getElementById("loading").innerText = "Post not found.";
    return;
  }

  currentPost = data[0];
  currentPostId = currentPost.id;

  document.getElementById("postTitle").innerText = currentPost.title || "Untitled Post";
  document.getElementById("postContent").innerText = currentPost.content || "";
  document.getElementById("postCategory").innerText = currentPost.category || "General";
  document.getElementById("postMeta").innerText = `${currentPost.category || "General"} • ${new Date(currentPost.created_at).toLocaleString("en-IN")}`;
  document.getElementById("authorAvatar").innerText = getInitials(currentPost.user_id);

  document.getElementById("loading").style.display = "none";
  document.getElementById("pageContent").style.display = "grid";

  await loadLikes();
  await loadComments();
  await loadRelatedPosts();
}

async function loadLikes(){
  const { data: likes } = await supabaseClient
    .from("likes")
    .select("*")
    .eq("post_id", currentPostId);

  const likeCount = likes ? likes.length : 0;

  userLiked = false;
  if(currentUser && likes){
    userLiked = likes.some(like => like.user_id === currentUser.id);
  }

  document.getElementById("likeCount").innerText = likeCount;
  document.getElementById("likeBtn").innerText = `👍 ${likeCount}`;

  if(userLiked){
    document.getElementById("likeBtn").style.background = "linear-gradient(135deg,#ffcf33,#00e5ff)";
    document.getElementById("likeBtn").style.color = "#06101d";
  }else{
    document.getElementById("likeBtn").style.background = "rgba(255,255,255,.09)";
    document.getElementById("likeBtn").style.color = "#eef6ff";
  }
}

async function toggleLike(){
  if(!currentUser){
    alert("Please login first to like posts.");
    window.location.href = "login.html";
    return;
  }

  if(userLiked){
    await supabaseClient
      .from("likes")
      .delete()
      .eq("post_id", currentPostId)
      .eq("user_id", currentUser.id);
  }else{
    const { error } = await supabaseClient
      .from("likes")
      .insert({
        post_id: currentPostId,
        user_id: currentUser.id
      });

    if(error){
      alert(error.message);
      return;
    }
  }

  await loadLikes();
}

async function loadComments(){
  const { data, error } = await supabaseClient
    .from("comments")
    .select("*")
    .eq("post_id", currentPostId)
    .order("created_at",{ascending:true});

  const commentsBox = document.getElementById("comments");

  if(error){
    commentsBox.innerHTML = `<div class="comment">Unable to load comments: ${escapeHTML(error.message)}</div>`;
    return;
  }

  document.getElementById("commentCount").innerText = data ? data.length : 0;

  if(!data || !data.length){
    commentsBox.innerHTML = `<div class="comment"><strong>No comments yet</strong><p>Start the discussion.</p></div>`;
    return;
  }

  commentsBox.innerHTML = data.map(comment => `
    <div class="comment">
      <strong>Community Member</strong>
      <small>${new Date(comment.created_at).toLocaleString("en-IN")}</small>
      <p class="post-content">${escapeHTML(comment.comment)}</p>
    </div>
  `).join("");
}

async function addComment(){
  if(!currentUser){
    alert("Please login first to comment.");
    window.location.href = "login.html";
    return;
  }

  const box = document.getElementById("commentBox");
  const text = box.value.trim();

  if(!text){
    showMessage("error","Please write a comment first.");
    return;
  }

  const { error } = await supabaseClient
    .from("comments")
    .insert({
      post_id: currentPostId,
      user_id: currentUser.id,
      comment: text
    });

  if(error){
    showMessage("error",error.message);
    return;
  }

  showMessage("success","Comment added successfully.");
  box.value = "";
  await loadComments();
}

async function loadRelatedPosts(){
  const { data } = await supabaseClient
    .from("posts")
    .select("*")
    .neq("id", currentPostId)
    .order("created_at",{ascending:false})
    .limit(3);

  const related = document.getElementById("relatedPosts");

  if(!data || !data.length){
    related.innerHTML = `<div class="side-item">No related posts yet.</div>`;
    return;
  }

  related.innerHTML = data.map(post => `
    <a class="side-item" href="post.html?id=${post.id}">
      <h3>${escapeHTML(post.title)}</h3>
      <p>${escapeHTML(post.category)}</p>
    </a>
  `).join("");
}

function sharePost(){
  navigator.clipboard.writeText(window.location.href);
  alert("Post link copied.");
}

async function init(){
  await checkSession();
  await loadPost();
}

init();
</script>

</body>
</html>
